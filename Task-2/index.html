<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Photo Album</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="album-container">
        <h1>My Personal Photo Album</h1>
        
        <div class="category-buttons">
            <button class="category-btn active" data-category="birthday">Birthday</button>
            <button class="category-btn" data-category="pets">Pets</button>
            <button class="category-btn" data-category="cars">Cars</button>
        </div>

        <div class="photo-display" id="photoDisplay">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
